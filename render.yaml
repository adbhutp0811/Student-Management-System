services:
  - type: web
    name: student-management
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput; exec gunicorn student_management.wsgi:application --workers 2 --worker-class sync --timeout 120 --access-logfile - --log-level info
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: DATABASE_URL
        fromDatabase:
          name: student-management-db
          property: connectionString

databases:
  - name: student-management-db
    databaseName: student_management
    plan: free
